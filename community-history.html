<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지난 커뮤니티 현황 — 해빛스쿨</title>
    <meta name="description" content="해빛스쿨 월별 커뮤니티 현황 아카이브 — MVP TOP3, 카테고리왕, 연속기록 등 지난 달 기록 모음">
    <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 50%, #E0F2F1 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 20px 16px 60px;
        }

        .header {
            text-align: center;
            padding: 28px 20px 22px;
            background: linear-gradient(135deg, #388E3C, #43A047);
            border-radius: 20px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 0 4px 20px rgba(56, 142, 60, 0.3);
        }
        .header h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
        .header .subtitle { font-size: 13px; opacity: 0.88; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #388E3C;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 16px;
            padding: 6px 0;
        }

        /* 로딩 / 빈 상태 */
        .state-box {
            background: white;
            border-radius: 16px;
            padding: 48px 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            color: #888;
            font-size: 14px;
        }
        .state-box .icon { font-size: 40px; margin-bottom: 12px; }
        .state-box .title { font-size: 16px; font-weight: 700; color: #444; margin-bottom: 6px; }

        /* 월별 카드 */
        .month-card {
            background: white;
            border-radius: 16px;
            margin-bottom: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .month-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .month-header:active { background: #f9f9f9; }
        .month-title {
            font-size: 17px;
            font-weight: 700;
            color: #2E7D32;
        }
        .month-summary {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
        .month-chevron {
            font-size: 18px;
            color: #aaa;
            transition: transform 0.2s;
        }
        .month-card.open .month-chevron { transform: rotate(180deg); }

        .month-body {
            display: none;
            padding: 0 16px 16px;
            border-top: 1px solid #f0f0f0;
        }
        .month-card.open .month-body { display: block; }

        /* 통계 그리드 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 14px 0 10px;
        }
        .stat-item {
            text-align: center;
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
            border-radius: 10px;
            padding: 10px 6px;
        }
        .stat-num { display: block; font-size: 15px; font-weight: 800; color: #2E7D32; }
        .stat-label { display: block; font-size: 10px; color: #555; margin-top: 1px; }

        /* 하이라이트 */
        .highlight {
            background: #FFF8E1;
            border-radius: 10px;
            padding: 9px 12px;
            font-size: 13px;
            margin: 8px 0;
            color: #6D4C41;
        }

        /* 카테고리왕 */
        .cat-kings {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
        }
        .cat-king {
            background: #E8F5E9;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 12px;
            color: #2E7D32;
        }

        /* MVP 랭킹 */
        .mvp-title {
            font-size: 13px;
            font-weight: 700;
            color: #444;
            margin: 12px 0 6px;
        }
        .mvp-list { display: flex; flex-direction: column; gap: 6px; }
        .mvp-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 13px;
        }
        .mvp-item.rank-1 { background: linear-gradient(135deg, #FFF8E1, #FFECB3); }
        .mvp-item.rank-2 { background: linear-gradient(135deg, #F5F5F5, #EEEEEE); }
        .mvp-item.rank-3 { background: linear-gradient(135deg, #FBE9E7, #FFCCBC); }
        .mvp-medal { font-size: 18px; }
        .mvp-name { font-weight: 700; flex: 1; }
        .mvp-days { font-size: 11px; color: #777; }
        .mvp-reward { font-size: 12px; font-weight: 700; color: #388E3C; white-space: nowrap; }

        .mvp-score-info {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="javascript:history.back()" class="back-btn">← 돌아가기</a>

    <div class="header">
        <h1>📅 지난 커뮤니티 현황</h1>
        <div class="subtitle">월별 커뮤니티 활동 기록 아카이브</div>
    </div>

    <div id="content">
        <div class="state-box">
            <div class="icon">⏳</div>
            <div class="title">불러오는 중...</div>
        </div>
    </div>
</div>

<script type="module">
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { auth, db } from './js/firebase-config.js';

const content = document.getElementById('content');

const MEDALS = ['🥇', '🥈', '🥉'];
const REWARDS = ['5,000P', '2,000P', '500P'];

function renderMonthCard(monthId, data) {
    const card = document.createElement('div');
    card.className = 'month-card';

    const [y, m] = monthId.split('-');
    const label = `${y}년 ${parseInt(m)}월`;

    const ranked = data.ranked || [];
    const summaryParts = [];
    if (data.totalUsers) summaryParts.push(`${data.totalUsers}명 참여`);
    if (ranked[0]) summaryParts.push(`MVP: ${ranked[0].name}`);

    card.innerHTML = `
        <div class="month-header" onclick="this.closest('.month-card').classList.toggle('open')">
            <div>
                <div class="month-title">${label}</div>
                <div class="month-summary">${summaryParts.join(' · ')}</div>
            </div>
            <span class="month-chevron">▼</span>
        </div>
        <div class="month-body">
            <div class="stats-grid">
                <div class="stat-item"><span class="stat-num">${data.totalUsers || 0}명</span><span class="stat-label">참여 회원</span></div>
                <div class="stat-item"><span class="stat-num">${data.newMemberCount || 0}명</span><span class="stat-label">🌟 신규</span></div>
                <div class="stat-item"><span class="stat-num">${data.totalComments || 0}개</span><span class="stat-label">댓글</span></div>
                <div class="stat-item"><span class="stat-num">${data.totalReactions || 0}개</span><span class="stat-label">리액션</span></div>
            </div>
            ${data.bestStreak >= 2 ? `<div class="highlight">🔥 연속 기록: <strong>${data.bestStreakName}</strong> ${data.bestStreak}일!</div>` : ''}
            <div class="cat-kings">
                ${data.dietKing?.count > 0 ? `<span class="cat-king">🥗 <strong>${data.dietKing.name}</strong> ${data.dietKing.count}일</span>` : ''}
                ${data.exerciseKing?.count > 0 ? `<span class="cat-king">🏃 <strong>${data.exerciseKing.name}</strong> ${data.exerciseKing.count}일</span>` : ''}
                ${data.mindKing?.count > 0 ? `<span class="cat-king">🌙 <strong>${data.mindKing.name}</strong> ${data.mindKing.count}일</span>` : ''}
            </div>
            ${ranked.length > 0 ? `
                <div class="mvp-title">🏆 MVP TOP 3</div>
                <div class="mvp-list">
                    ${ranked.map((u, i) => `
                        <div class="mvp-item rank-${i + 1}">
                            <span class="mvp-medal">${MEDALS[i]}</span>
                            <span class="mvp-name">${u.name}</span>
                            <span class="mvp-days">${u.days}일·💬${u.comments}·❤️${u.reactions}</span>
                            <span class="mvp-reward">${REWARDS[i]}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="mvp-score-info">MVP 점수 = 기록×10 + 댓글×3 + 리액션×1</div>
            ` : ''}
        </div>
    `;
    return card;
}

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        content.innerHTML = `
            <div class="state-box">
                <div class="icon">🔒</div>
                <div class="title">로그인이 필요합니다</div>
                <div>앱으로 돌아가서 로그인해 주세요.</div>
            </div>`;
        return;
    }

    try {
        const q = query(collection(db, 'communityStats_archive'));
        const snap = await getDocs(q);

        if (snap.empty) {
            content.innerHTML = `
                <div class="state-box">
                    <div class="icon">🌱</div>
                    <div class="title">아직 기록이 없어요</div>
                    <div>이번 달이 첫 번째 아카이브입니다.<br>다음 달부터 여기에 쌓여요!</div>
                </div>`;
            return;
        }

        // 월 내림차순 정렬
        const docs = snap.docs.sort((a, b) => b.id.localeCompare(a.id));

        content.innerHTML = '';
        docs.forEach(doc => {
            content.appendChild(renderMonthCard(doc.id, doc.data()));
        });

        // 가장 최근 달 자동 열기
        const first = content.querySelector('.month-card');
        if (first) first.classList.add('open');

    } catch (e) {
        content.innerHTML = `
            <div class="state-box">
                <div class="icon">⚠️</div>
                <div class="title">불러오기 실패</div>
                <div>${e.message}</div>
            </div>`;
    }
});
</script>
</body>
</html>
