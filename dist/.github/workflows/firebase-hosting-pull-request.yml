# Deploy a preview channel to Firebase Hosting for each pull request.
# This workflow uses the Firebase Hosting GitHub Action.
# See: https://firebase.google.com/docs/hosting/github-integration

name: Deploy to Firebase Hosting on PR

"on":
  pull_request:
    branches:
      - main

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy PR preview to Firebase Hosting (habitschool)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HABITSCHOOL }}
          expires: 7d
          target: habitschool
          projectId: habitschool-8497b
