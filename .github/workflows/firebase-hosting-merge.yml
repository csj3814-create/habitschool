# Deploy to Firebase Hosting when a commit is pushed to the main branch.
# This workflow uses the Firebase Hosting GitHub Action.
# See: https://firebase.google.com/docs/hosting/github-integration

name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting (habitschool)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HABITSCHOOL }}
          channelId: live
          target: habitschool
          projectId: habitschool-8497b
